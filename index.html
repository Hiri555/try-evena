<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offre Spéciale - 100% Pure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #f5f5f5, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            background: linear-gradient(135deg, #d4a574 0%, #c9987f 100%);
            padding: 40px 30px;
            position: relative;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        .product-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .brush-icon {
            width: 40px;
            height: 120px;
            background: linear-gradient(to bottom, #d4a574 0%, #f5e5d3 50%, #ffffff 100%);
            border-radius: 20px 20px 50% 50%;
            position: relative;
            transform: rotate(-15deg);
        }

        .brush-icon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(8px);
        }

        .foundation-bottle {
            width: 50px;
            height: 100px;
            background: linear-gradient(to bottom, #d4a574 0%, #c9987f 100%);
            border-radius: 8px;
            position: relative;
        }

        .foundation-bottle::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: #b8895f;
            border-radius: 4px 4px 0 0;
            border-top: 3px solid #d4a574;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .offer-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .cta-button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #b8895f 0%, #a67b5b 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(184, 137, 95, 0.3);
            margin-bottom: 30px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 137, 95, 0.4);
        }

        .timer-section {
            text-align: center;
        }

        .timer-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .time-box {
            background: #333;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            min-width: 50px;
        }

        .sticky-button {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #b8895f 0%, #a67b5b 100%);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .sticky-button:hover {
            background: linear-gradient(135deg, #a67b5b 0%, #956a4d 100%);
            box-shadow: 0 -6px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 480px) {
            .container {
                margin: 0;
                margin-bottom: 80px;
            }

            .offer-text {
                font-size: 14px;
            }

            .time-box {
                padding: 10px 12px;
                font-size: 18px;
                min-width: 45px;
            }

            .sticky-button {
                padding: 16px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-image">
            <div class="logo">
                100%<br>PURE
            </div>
            <div class="product-display">
                <div class="brush-icon"></div>
                <div class="foundation-bottle"></div>
            </div>
        </div>

        <div class="content">
            <p class="offer-text">
                Cliquez ci-dessous et réclamez votre offre spéciale aujourd'hui!
            </p>

            <a href="https://try-evena.com/products/evena-fond-de-teint-4-en-1" class="cta-button" style="text-decoration: none; display: block;">
                Profiter de l'offre spéciale
            </a>

            <div class="timer-section">
                <p class="timer-label">Se termine dans:</p>
                <div class="countdown">
                    <div class="time-box" id="hours">00</div>
                    <div class="time-box" id="minutes">43</div>
                    <div class="time-box" id="seconds">30</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration du compte à rebours
        let totalSeconds = (0 * 3600) + (43 * 60) + 30; // 43 minutes et 30 secondes

        function updateCountdown() {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            if (totalSeconds > 0) {
                totalSeconds--;
            } else {
                // Réinitialiser le compte à rebours quand il atteint 0
                totalSeconds = (0 * 3600) + (43 * 60) + 30;
            }
        }

        // Démarrer le compte à rebours
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

    <a href="https://try-evena.com/products/evena-fond-de-teint-4-en-1" class="sticky-button">
        Réclamez votre offre spéciale maintenant →
    </a>
</body>
</html>
